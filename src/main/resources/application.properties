spring.application.name=bidding-command-service
server.port=${PORT:8085}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.datasource.url=${BIDDING_DB_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bidmart}}
spring.datasource.username=${BIDDING_DB_USERNAME:${SPRING_DATASOURCE_USERNAME:postgres}}
spring.datasource.password=${BIDDING_DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:postgres}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-seconds=${JWT_EXP_SECONDS:604800}
wallet.service.base-url=${WALLET_SERVICE_BASE_URL:http://localhost:8084}
internal.service-token=${INTERNAL_SERVICE_TOKEN:}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
auction.lifecycle.scan-interval-ms=${AUCTION_LIFECYCLE_SCAN_INTERVAL_MS:1000}
auction.lifecycle.closed-visible-seconds=${AUCTION_CLOSED_VISIBLE_SECONDS:5}