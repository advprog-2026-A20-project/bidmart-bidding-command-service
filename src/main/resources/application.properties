spring.application.name=bidding-command-service
server.port=${PORT:8085}

spring.datasource.url=${BIDDING_DB_URL:${SPRING_DATASOURCE_URL:jdbc:h2:mem:bidding;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}
spring.datasource.username=${BIDDING_DB_USERNAME:${SPRING_DATASOURCE_USERNAME:sa}}
spring.datasource.password=${BIDDING_DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.datasource.driver-class-name=${BIDDING_DB_DRIVER_CLASS_NAME:${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false

security.jwt.secret=${JWT_SECRET:local-dev-secret-please-change-32-chars}
security.jwt.expiration-seconds=${JWT_EXP_SECONDS:604800}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

internal.service-token=${INTERNAL_SERVICE_TOKEN:}
